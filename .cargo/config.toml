[alias]
b = "build"
r = "run"
t = "test"
c = "check"
lint = "clippy --all-targets --all-features -- -D warnings"

[env]
WORKSPACE_PATH = { value = ".", relative = true }

[profile.dev]
# TAS-366: Incremental compilation re-enabled (was disabled for external drive hard-link
# workaround on a machine that no longer exists). This is a significant inner-loop win.
incremental = true
split-debuginfo = "unpacked"  # Reduces debug artifact size on macOS

[profile.release]
incremental = false  # Disable for release builds

# TAS-366: Use mold linker for faster link times on Linux.
# mold only supports ELF (Linux) — macOS uses the default Apple linker.
# CI: rui314/setup-mold@v1 installs mold; this config tells cargo to use it.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
