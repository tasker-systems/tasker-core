# Tasker Unified Configuration (TAS-311)
#
# This file configures both CLI tools (tasker-ctl) and client profiles
# (tasker-ctl, tasker-mcp). See: https://github.com/tasker-systems/tasker-core
#
# Profile precedence:
#   1. Environment variables (highest)
#   2. Selected profile settings
#   3. [profile.default] settings
#   4. Hardcoded defaults (lowest)
#
# Available transports: "rest" (default), "grpc"

# =============================================================================
# Default Profile - REST API
# =============================================================================
[profile.default]
transport = "rest"

[profile.default.orchestration]
base_url = "http://localhost:8080"
timeout_ms = 30000
max_retries = 3

[profile.default.worker]
base_url = "http://localhost:8081"
timeout_ms = 30000
max_retries = 3

# =============================================================================
# gRPC Profile - gRPC API
# =============================================================================
[profile.grpc]
transport = "grpc"

[profile.grpc.orchestration]
base_url = "http://localhost:9190"
timeout_ms = 30000

[profile.grpc.worker]
base_url = "http://localhost:9191"
timeout_ms = 30000

# =============================================================================
# Auth Profile - REST with API Key Authentication
# =============================================================================
[profile.auth]
transport = "rest"

[profile.auth.orchestration]
base_url = "http://localhost:8080"

[profile.auth.orchestration.auth]
method = { type = "ApiKey", value = { key = "test-api-key-full-access", header_name = "X-API-Key" } }

[profile.auth.worker]
base_url = "http://localhost:8081"

[profile.auth.worker.auth]
method = { type = "ApiKey", value = { key = "test-api-key-full-access", header_name = "X-API-Key" } }

# =============================================================================
# gRPC Auth Profile - gRPC with API Key Authentication
# =============================================================================
[profile.grpc-auth]
transport = "grpc"

[profile.grpc-auth.orchestration]
base_url = "http://localhost:9190"

[profile.grpc-auth.orchestration.auth]
method = { type = "ApiKey", value = { key = "test-api-key-full-access", header_name = "X-API-Key" } }

[profile.grpc-auth.worker]
base_url = "http://localhost:9191"

[profile.grpc-auth.worker.auth]
method = { type = "ApiKey", value = { key = "test-api-key-full-access", header_name = "X-API-Key" } }

# =============================================================================
# CI Profile - Longer Timeouts for CI Environments
# =============================================================================
[profile.ci]
transport = "rest"

[profile.ci.orchestration]
base_url = "http://localhost:8080"
timeout_ms = 60000
max_retries = 5

[profile.ci.worker]
base_url = "http://localhost:8081"
timeout_ms = 60000
max_retries = 5

# =============================================================================
# Local Development Profile
# =============================================================================
[profile.local]
transport = "rest"

[profile.local.orchestration]
base_url = "http://localhost:8080"
timeout_ms = 10000
max_retries = 1

[profile.local.worker]
base_url = "http://localhost:8081"
timeout_ms = 10000
max_retries = 1

# =============================================================================
# CLI — Plugin paths, template defaults, and remote repositories
# =============================================================================

[cli]
# Additional local plugin directories (besides remotes)
# plugin-paths = ["./plugins"]

# Default language for template generation
# default-language = "ruby"

# Default output directory for generated files
# default-output-dir = "."

# Hours before cached remotes are considered stale (default: 24)
# cache-max-age-hours = 24

[[cli.remotes]]
name = "tasker-contrib"
url = "https://github.com/tasker-systems/tasker-contrib.git"
